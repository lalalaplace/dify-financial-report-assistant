app:
  name: financial-report-ai-assistant
  mode: advanced-chat
  description: 脱敏版 Dify 工作流模板，用于展示财报问数链路。

kind: app
version: 0.1.0

workflow:
  description: >
    这是公开仓库中的脱敏模板，不包含账号、密码、API Key 或私有地址。
    导入 Dify 后需要按实际环境补充模型供应商、HTTP 节点地址和变量映射。
  graph:
    nodes:
      - id: start
        type: start
        title: 用户输入
        data:
          variables:
            - variable: query
              label: 用户问题
              type: paragraph
              required: true
      - id: intent_parser
        type: llm
        title: 意图识别
        data:
          prompt_template:
            - role: system
              text: 将用户财报问题解析为公司、年份、报告期和财务指标 JSON。
      - id: sql_generator
        type: llm
        title: SQL 生成
        data:
          prompt_template:
            - role: system
              text: 只生成 PostgreSQL SELECT 查询，禁止写入、删除和建表语句。
      - id: query_api
        type: http-request
        title: 查询财务数据库
        data:
          method: post
          url: http://<API_HOST>:8000/query
      - id: chart_api
        type: http-request
        title: 生成图表
        data:
          method: post
          url: http://<API_HOST>:8000/chart
      - id: final_answer
        type: answer
        title: 最终回答
        data:
          answer: "{{ query_api.body }}\n{{ chart_api.body }}"
    edges:
      - source: start
        target: intent_parser
      - source: intent_parser
        target: sql_generator
      - source: sql_generator
        target: query_api
      - source: query_api
        target: chart_api
      - source: chart_api
        target: final_answer
